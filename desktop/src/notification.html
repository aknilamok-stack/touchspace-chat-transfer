<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"
    />
    <title>TouchSpace Notification</title>
    <style>
      :root {
        color-scheme: light;
        --card-width: 420px;
        --card-radius: 24px;
        --footer-radius: 16px;
        --touchspace-blue: #0A84FF;
        --card-bg: var(--touchspace-blue);
        --card-border: var(--touchspace-blue);
        --card-shadow: none;
        --text-primary: #ffffff;
        --text-subtle: rgba(255, 255, 255, 0.9);
        --text-meta: rgba(255, 255, 255, 0.8);
        --footer-bg: var(--touchspace-blue);
        --footer-border: rgba(255, 255, 255, 0.2);
        --action-hover: rgba(255, 255, 255, 0.1);
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        background: transparent;
        font-family:
          Inter,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
      }

      body {
        overflow: hidden;
        opacity: 0;
      }

      body.is-ready {
        opacity: 1;
      }

      .shell {
        width: 100%;
        height: 100%;
        box-sizing: border-box;
        padding: 12px;
        display: flex;
        align-items: flex-end;
        justify-content: flex-end;
      }

      .card {
        width: min(var(--card-width), calc(100vw - 24px));
        overflow: hidden;
        border-radius: var(--card-radius);
        border: 1px solid var(--card-border);
        background: var(--card-bg) !important;
        background-color: var(--card-bg) !important;
        background-image: none !important;
        opacity: 1;
        color: var(--text-primary);
        box-shadow: var(--card-shadow);
        user-select: none;
        -webkit-backdrop-filter: none;
        backdrop-filter: none;
      }

      .tone-blue {
        --card-bg: var(--touchspace-blue);
        --card-border: var(--touchspace-blue);
        --card-shadow: none;
        --text-primary: #ffffff;
        --text-subtle: rgba(255, 255, 255, 0.9);
        --text-meta: rgba(255, 255, 255, 0.8);
        --footer-bg: var(--touchspace-blue);
        --footer-border: rgba(255, 255, 255, 0.2);
        --action-hover: rgba(255, 255, 255, 0.1);
      }

      .tone-green {
        --card-bg: var(--touchspace-blue);
        --card-border: var(--touchspace-blue);
        --card-shadow: none;
        --text-primary: #ffffff;
        --text-subtle: rgba(255, 255, 255, 0.9);
        --text-meta: rgba(255, 255, 255, 0.8);
        --footer-bg: var(--touchspace-blue);
        --footer-border: rgba(255, 255, 255, 0.2);
        --action-hover: rgba(255, 255, 255, 0.1);
      }

      .tone-amber {
        --card-bg: var(--touchspace-blue);
        --card-border: var(--touchspace-blue);
        --card-shadow: none;
        --text-primary: #ffffff;
        --text-subtle: rgba(255, 255, 255, 0.9);
        --text-meta: rgba(255, 255, 255, 0.8);
        --footer-bg: var(--touchspace-blue);
        --footer-border: rgba(255, 255, 255, 0.2);
        --action-hover: rgba(255, 255, 255, 0.1);
      }

      .card-button {
        border: 0;
        background: transparent;
        color: inherit;
        font: inherit;
        cursor: pointer;
        -webkit-appearance: none;
        appearance: none;
        outline: none;
      }

      .header {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 12px;
        padding: 20px 20px 16px;
      }

      .header-label {
        margin: 0;
        font-size: 15px;
        line-height: 1.2;
        font-weight: 600;
        letter-spacing: 0.01em;
      }

      .close {
        position: relative;
        flex: 0 0 auto;
        width: 34px;
        height: 34px;
        margin: -6px -6px 0 0;
        padding: 0;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.14);
        font-size: 0;
        line-height: 0;
        opacity: 0.96;
        transition:
          background 160ms ease,
          opacity 160ms ease,
          transform 160ms ease;
      }

      .close::before,
      .close::after {
        content: "";
        position: absolute;
        left: 50%;
        top: 50%;
        width: 16px;
        height: 2.5px;
        border-radius: 999px;
        background: #ffffff;
        transform-origin: center;
      }

      .close::before {
        transform: translate(-50%, -50%) rotate(45deg);
      }

      .close::after {
        transform: translate(-50%, -50%) rotate(-45deg);
      }

      .close:hover {
        background: rgba(255, 255, 255, 0.22);
        opacity: 1;
      }

      .close:active {
        transform: scale(0.94);
      }

      .close:focus,
      .close:focus-visible {
        outline: none;
        box-shadow: none;
      }

      .content {
        display: flex;
        gap: 16px;
        padding: 0 20px 20px;
      }

      .avatar {
        flex-shrink: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        width: 48px;
        height: 48px;
        border-radius: 999px;
        font-size: 20px;
        line-height: 1;
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.24);
      }

      .content-body {
        min-width: 0;
        flex: 1;
      }

      .title,
      .subtitle,
      .message {
        display: -webkit-box;
        -webkit-box-orient: vertical;
        overflow: hidden;
        word-break: break-word;
      }

      .title {
        margin: 0;
        font-size: 15px;
        line-height: 1.35;
        font-weight: 500;
        -webkit-line-clamp: 2;
      }

      .subtitle {
        margin: 4px 0 0;
        font-size: 14px;
        line-height: 1.4;
        color: var(--text-subtle);
        -webkit-line-clamp: 2;
      }

      .message {
        margin: 16px 0 0;
        font-size: 15px;
        line-height: 1.45;
        color: var(--text-primary);
        opacity: 0.95;
        -webkit-line-clamp: 2;
      }

      .meta {
        margin: 12px 0 0;
        font-size: 12px;
        line-height: 1.4;
        font-weight: 500;
        color: var(--text-meta);
      }

      .footer {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 0;
        padding: 8px;
        border-top: 1px solid var(--footer-border);
        background: var(--footer-bg) !important;
        background-color: var(--footer-bg) !important;
        background-image: none !important;
      }

      .action {
        padding: 12px 16px;
        border-radius: var(--footer-radius);
        font-size: 14px;
        line-height: 1.2;
        font-weight: 500;
      }

      .action:hover {
        background: var(--action-hover);
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <section class="card tone-blue" id="card">
        <div class="header">
          <p class="header-label" id="header">Входящее сообщение</p>
          <button class="card-button close" id="close" aria-label="Закрыть уведомление"></button>
        </div>

        <div class="content" id="primary-surface">
          <div class="avatar" id="avatar">💬</div>
          <div class="content-body">
            <p class="title" id="title">Новое сообщение</p>
            <p class="subtitle" id="subtitle" hidden></p>
            <p class="message" id="message">Появилось новое сообщение в TouchSpace.</p>
            <p class="meta" id="meta" hidden></p>
          </div>
        </div>

        <div class="footer">
          <button class="card-button action" id="primary">Открыть</button>
          <button class="card-button action" id="secondary">Позже</button>
        </div>
      </section>
    </div>

    <script>
      const cardElement = document.getElementById("card");
      const headerElement = document.getElementById("header");
      const titleElement = document.getElementById("title");
      const subtitleElement = document.getElementById("subtitle");
      const messageElement = document.getElementById("message");
      const metaElement = document.getElementById("meta");
      const primaryButton = document.getElementById("primary");
      const secondaryButton = document.getElementById("secondary");
      const closeButton = document.getElementById("close");
      const avatarElement = document.getElementById("avatar");
      const primarySurfaceElement = document.getElementById("primary-surface");

      let currentUrl = "";

      const resolveAvatar = (title) => {
        const normalized = String(title || "").trim();
        return normalized ? normalized.charAt(0).toUpperCase() : "💬";
      };

      const setTone = (tone) => {
        cardElement.classList.remove("tone-blue", "tone-green", "tone-amber");
        cardElement.classList.add("tone-blue");
      };

      window.touchspaceDesktopNotification.onData((payload) => {
        headerElement.textContent = payload?.header || "Входящее сообщение";
        titleElement.textContent = payload?.title || "Новое сообщение";
        subtitleElement.textContent = payload?.subtitle || "";
        subtitleElement.hidden = !payload?.subtitle;
        messageElement.textContent =
          payload?.body || "Появилось новое сообщение в TouchSpace.";
        metaElement.textContent = payload?.metaLabel || "";
        metaElement.hidden = !payload?.metaLabel;
        primaryButton.textContent = payload?.primaryLabel || "Ответить";
        secondaryButton.textContent = payload?.secondaryLabel || "Позже";
        currentUrl = payload?.url || "";
        avatarElement.textContent = payload?.avatarEmoji || resolveAvatar(payload?.title);
        avatarElement.style.backgroundColor = payload?.avatarColor || "rgba(255, 255, 255, 0.24)";
        setTone(payload?.tone);
        document.body.classList.add("is-ready");
        requestAnimationFrame(() => {
          window.touchspaceDesktopNotification.rendered();
        });
      });

      const handlePrimary = () => {
        void window.touchspaceDesktopNotification.act("primary", currentUrl);
      };

      primarySurfaceElement.addEventListener("click", handlePrimary);
      primarySurfaceElement.addEventListener("keydown", (event) => {
        if (event.key === "Enter" || event.key === " ") {
          event.preventDefault();
          handlePrimary();
        }
      });
      primarySurfaceElement.tabIndex = 0;
      primarySurfaceElement.setAttribute("role", "button");

      const stopNotificationAction = (event) => {
        event.preventDefault();
        event.stopPropagation();
      };

      primaryButton.addEventListener("click", (event) => {
        stopNotificationAction(event);
        void window.touchspaceDesktopNotification.act("primary", currentUrl);
      });

      secondaryButton.addEventListener("click", (event) => {
        stopNotificationAction(event);
        void window.touchspaceDesktopNotification.act("secondary", currentUrl);
      });

      ["pointerdown", "pointerup", "mousedown", "mouseup"].forEach((eventName) => {
        closeButton.addEventListener(eventName, stopNotificationAction);
      });

      closeButton.addEventListener("click", (event) => {
        stopNotificationAction(event);
        void window.touchspaceDesktopNotification.act("close", currentUrl);
      });
    </script>
  </body>
</html>
